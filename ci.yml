name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  flutter-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # compileSdk/AndroidX mismatches surface here — pin compileSdkVersion
      # in android/app/build.gradle if this step fails on a fresh checkout.
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: vayu-ai-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  functions-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy-functions:
    needs: [functions-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npx firebase-tools deploy --only functions --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
